# LifeOps prompt benchmark harness (#8795)
#
# PR runs execute the hermetic catalog-shape test so the TS benchmark runner is
# not orphaned. Manual dispatch can enable the live LLM benchmark by setting
# live=true and providing the usual provider secret(s).

name: LifeOps Prompt Benchmark

on:
  pull_request:
    branches: [develop]
    paths:
      - "plugins/plugin-personal-assistant/test/helpers/lifeops-prompt-benchmark-*.ts"
      - "plugins/plugin-personal-assistant/test/lifeops-prompt-benchmark.test.ts"
      - "plugins/plugin-personal-assistant/src/actions/**"
      - "plugins/plugin-personal-assistant/src/lifeops/**"
      - "plugins/plugin-calendar/src/actions/**"
      - "plugins/plugin-training/src/**"
      - ".github/workflows/lifeops-prompt-benchmark.yml"
  workflow_dispatch:
    inputs:
      live:
        description: "Run the live LLM benchmark slice"
        required: false
        type: boolean
        default: false
      case_limit:
        description: "Live direct-case limit"
        required: false
        type: string
        default: "15"

concurrency:
  group: lifeops-prompt-benchmark-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: "canary"
  NODE_VERSION: "24.15.0"

jobs:
  prompt-benchmark:
    name: prompt-benchmark
    runs-on: ${{ fromJSON(vars.HETZNER_FLEET_ONLINE == 'false' && '["ubuntu-24.04"]' || '["self-hosted","hetzner-robot"]') }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          submodules: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          install-native-deps: "false"

      - name: Run LifeOps prompt benchmark test
        env:
          LIFEOPS_PROMPT_BENCHMARK_LIVE: ${{ github.event_name == 'workflow_dispatch' && inputs.live == true && '1' || '0' }}
          LIFEOPS_PROMPT_BENCHMARK_CASE_LIMIT: ${{ inputs.case_limit || '15' }}
          LIFEOPS_PROMPT_BENCHMARK_TARGET: host
          LIFEOPS_PROMPT_BENCHMARK_ARTIFACT_DIR: ${{ runner.temp }}/lifeops-prompt-benchmark
          ELIZA_TRAJECTORY_DIR: ${{ runner.temp }}/lifeops-prompt-benchmark/native-trajectories
          ELIZA_TRAJECTORY_LOGGING: ${{ github.event_name == 'workflow_dispatch' && inputs.live == true && '1' || '0' }}
          ELIZA_AWAIT_FACTS_STAGE: "true"
          ELIZA_TRAJECTORY_REVIEW_MODE: "1"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          LOCAL_LLAMA_CPP_API_KEY: ${{ secrets.LOCAL_LLAMA_CPP_API_KEY }}
        run: |
          mkdir -p "$LIFEOPS_PROMPT_BENCHMARK_ARTIFACT_DIR"
          bun run --cwd plugins/plugin-personal-assistant test -- test/lifeops-prompt-benchmark.test.ts

      - name: Upload benchmark rows and native trajectories
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.live == true }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: lifeops-prompt-benchmark-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/lifeops-prompt-benchmark
          if-no-files-found: error
          retention-days: 14
