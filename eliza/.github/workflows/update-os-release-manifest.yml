name: Repair OS Release Manifest Checksums

# This is a manual recovery boundary, not a release entry point. It binds the
# checked-out develop SHA, tag commit, and complete stable release-asset
# inventory before reading bytes, then proposes a draft PR with exact receipts.
on:
  workflow_dispatch:
    inputs:
      manifest_path:
        description: Repo-relative manifest path under packages/os/release
        type: string
        required: true
      tag:
        description: Existing GitHub release tag whose assets populate the manifest
        type: string
        required: true
      expected_base_sha:
        description: Full current SHA of origin/develop to repair
        type: string
        required: true
      expected_tag_sha:
        description: Full commit SHA the release tag must resolve to
        type: string
        required: true

concurrency:
  group: os-manifest-recovery-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  repair-manifest:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out the explicitly approved base
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ inputs.expected_base_sha }}
          fetch-depth: 0

      - name: Bind base, tag, release, manifest, and asset identities
        id: identity
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_BASE_SHA: ${{ inputs.expected_base_sha }}
          EXPECTED_TAG_SHA: ${{ inputs.expected_tag_sha }}
          MANIFEST_PATH: ${{ inputs.manifest_path }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [[ ! "$EXPECTED_BASE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::expected_base_sha must be a full lowercase Git SHA"
            exit 1
          fi
          if [[ ! "$EXPECTED_TAG_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::expected_tag_sha must be a full lowercase Git SHA"
            exit 1
          fi
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::tag must be a versioned elizaOS release tag"
            exit 1
          fi
          if [[ "$MANIFEST_PATH" == /* || "$MANIFEST_PATH" == *..* || ! "$MANIFEST_PATH" =~ ^packages/os/release/[^/]+/manifest\.json$ ]]; then
            echo "::error::manifest_path must name packages/os/release/<release>/manifest.json"
            exit 1
          fi
          if [[ ! -f "$MANIFEST_PATH" || -L "$MANIFEST_PATH" ]]; then
            echo "::error::manifest_path must be a tracked regular file"
            exit 1
          fi

          checkout_sha="$(git rev-parse HEAD)"
          remote_base_sha="$(git ls-remote origin refs/heads/develop | cut -f1)"
          if [[ "$checkout_sha" != "$EXPECTED_BASE_SHA" || "$remote_base_sha" != "$EXPECTED_BASE_SHA" ]]; then
            echo "::error::develop moved or checkout identity differs from expected_base_sha"
            exit 1
          fi

          git fetch --no-tags origin "refs/tags/${RELEASE_TAG}"
          tag_sha="$(git rev-parse "FETCH_HEAD^{commit}")"
          if [[ "$tag_sha" != "$EXPECTED_TAG_SHA" ]]; then
            echo "::error::release tag resolved to ${tag_sha}, expected ${EXPECTED_TAG_SHA}"
            exit 1
          fi

          umask 077
          recovery_dir="${RUNNER_TEMP}/os-manifest-recovery/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          artifact_dir="${recovery_dir}/downloads"
          release_pre="${recovery_dir}/release.pre.json"
          assets_pre="${recovery_dir}/assets.pre.json"
          inventory_pre="${recovery_dir}/release-asset-inventory.pre.json"
          inventory_post="${recovery_dir}/release-asset-inventory.post.json"
          download_receipt="${recovery_dir}/download-receipt.json"
          asset_receipt="${recovery_dir}/asset-receipt.md"
          recovery_log="${recovery_dir}/recovery.log"
          mkdir -p "$artifact_dir"

          printf 'base_sha=%s\ntag=%s\ntag_sha=%s\nmanifest=%s\n' \
            "$checkout_sha" "$RELEASE_TAG" "$tag_sha" "$MANIFEST_PATH" | tee "$recovery_log"
          gh api "repos/${REPOSITORY}/releases/tags/${RELEASE_TAG}" > "$release_pre"
          release_id="$(node -e '
            const value = JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8"));
            if (!Number.isSafeInteger(value.id) || value.id <= 0) process.exit(1);
            process.stdout.write(String(value.id));
          ' "$release_pre")"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/releases/${release_id}/assets?per_page=100" > "$assets_pre"
          node packages/os/scripts/release-asset-inventory.mjs capture \
            --repository "$REPOSITORY" \
            --release "$release_pre" \
            --assets "$assets_pre" \
            --output "$inventory_pre" | tee -a "$recovery_log"

          branch="chore/os-manifest-recovery-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          {
            echo "branch=$branch"
            echo "base_sha=$checkout_sha"
            echo "tag_sha=$tag_sha"
            echo "release_id=$release_id"
          } >> "$GITHUB_OUTPUT"
          {
            echo "RECOVERY_DIR=$recovery_dir"
            echo "ARTIFACT_DIR=$artifact_dir"
            echo "INVENTORY_PRE=$inventory_pre"
            echo "INVENTORY_POST=$inventory_post"
            echo "DOWNLOAD_RECEIPT=$download_receipt"
            echo "ASSET_RECEIPT=$asset_receipt"
            echo "RECOVERY_LOG=$recovery_log"
          } >> "$GITHUB_ENV"

      - name: Download and verify the captured release asset set
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          download_plan="${RECOVERY_DIR}/download-plan.tsv"
          node packages/os/scripts/release-asset-inventory.mjs plan \
            --inventory "$INVENTORY_PRE" > "$download_plan"
          while IFS=$'\t' read -r asset_id asset_name; do
            printf 'download asset_id=%s name=%s\n' "$asset_id" "$asset_name" | tee -a "$RECOVERY_LOG"
            gh api \
              -H "Accept: application/octet-stream" \
              "repos/${REPOSITORY}/releases/assets/${asset_id}" > "$ARTIFACT_DIR/$asset_name"
          done < "$download_plan"
          node packages/os/scripts/release-asset-inventory.mjs verify \
            --inventory "$INVENTORY_PRE" \
            --artifact-root "$ARTIFACT_DIR" \
            --receipt "$DOWNLOAD_RECEIPT" \
            --markdown "$ASSET_RECEIPT" | tee -a "$RECOVERY_LOG"

      - name: Regenerate and verify every publishable checksum
        shell: bash
        env:
          MANIFEST_PATH: ${{ inputs.manifest_path }}
        run: |
          set -euo pipefail
          checksums="${RECOVERY_DIR}/SHA256SUMS"
          {
            echo '$ node packages/os/scripts/generate-release-checksums.mjs --update-manifest'
            node packages/os/scripts/generate-release-checksums.mjs \
              --manifest "$MANIFEST_PATH" \
              --artifact-root "$ARTIFACT_DIR" \
              --output "$checksums" \
              --update-manifest
            echo '$ node packages/os/scripts/validate-release-manifest.mjs --require-publishable-checksums'
            node packages/os/scripts/validate-release-manifest.mjs \
              --manifest "$MANIFEST_PATH" \
              --require-publishable-checksums
            echo '$ node packages/os/scripts/verify-release-checksums.mjs'
            node packages/os/scripts/verify-release-checksums.mjs \
              --manifest "$MANIFEST_PATH" \
              --artifact-root "$ARTIFACT_DIR" \
              --checksums "$checksums"
          } 2>&1 | tee -a "$RECOVERY_LOG"

      - name: Reject base, tag, release, and asset inventory drift
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_BASE_SHA: ${{ inputs.expected_base_sha }}
          EXPECTED_TAG_SHA: ${{ inputs.expected_tag_sha }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          remote_base_sha="$(git ls-remote origin refs/heads/develop | cut -f1)"
          if [[ "$remote_base_sha" != "$EXPECTED_BASE_SHA" ]]; then
            echo "::error::develop moved during recovery"
            exit 1
          fi
          git fetch --no-tags origin "refs/tags/${RELEASE_TAG}"
          post_tag_sha="$(git rev-parse "FETCH_HEAD^{commit}")"
          if [[ "$post_tag_sha" != "$EXPECTED_TAG_SHA" ]]; then
            echo "::error::release tag moved during recovery"
            exit 1
          fi

          release_post="${RECOVERY_DIR}/release.post.json"
          assets_post="${RECOVERY_DIR}/assets.post.json"
          gh api "repos/${REPOSITORY}/releases/tags/${RELEASE_TAG}" > "$release_post"
          post_release_id="$(node -e '
            const value = JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8"));
            if (!Number.isSafeInteger(value.id) || value.id <= 0) process.exit(1);
            process.stdout.write(String(value.id));
          ' "$release_post")"
          gh api --paginate --slurp \
            "repos/${REPOSITORY}/releases/${post_release_id}/assets?per_page=100" > "$assets_post"
          node packages/os/scripts/release-asset-inventory.mjs capture \
            --repository "$REPOSITORY" \
            --release "$release_post" \
            --assets "$assets_post" \
            --output "$INVENTORY_POST" | tee -a "$RECOVERY_LOG"
          node packages/os/scripts/release-asset-inventory.mjs compare \
            --expected "$INVENTORY_PRE" \
            --observed "$INVENTORY_POST" | tee -a "$RECOVERY_LOG"

          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}"
          {
            echo "## Exact OS manifest recovery receipt"
            echo
            echo "- Base SHA: \`${EXPECTED_BASE_SHA}\`"
            echo "- Release tag: \`${RELEASE_TAG}\`"
            echo "- Tag commit SHA: \`${EXPECTED_TAG_SHA}\`"
            echo "- Exact logs: [workflow run attempt](${run_url})"
            echo
            cat "$ASSET_RECEIPT"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open the draft checksum recovery pull request
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.identity.outputs.branch }}
          MANIFEST_PATH: ${{ inputs.manifest_path }}
          RELEASE_TAG: ${{ inputs.tag }}
          BASE_SHA: ${{ steps.identity.outputs.base_sha }}
          TAG_SHA: ${{ steps.identity.outputs.tag_sha }}
        run: |
          set -euo pipefail
          remote_base_sha="$(git ls-remote origin refs/heads/develop | cut -f1)"
          if [[ "$remote_base_sha" != "$BASE_SHA" ]]; then
            echo "::error::develop moved before recovery branch creation"
            exit 1
          fi
          if git diff --quiet -- "$MANIFEST_PATH"; then
            echo "Manifest already matches the exact verified release asset inventory; no PR was needed." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          unexpected="$(git diff --name-only | awk -v allowed="$MANIFEST_PATH" '$0 != allowed { print }')"
          if [[ -n "$unexpected" ]]; then
            echo "::error::checksum recovery changed unexpected files: ${unexpected}"
            exit 1
          fi

          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}"
          pr_body="${RECOVERY_DIR}/pull-request-body.md"
          node packages/os/scripts/release-asset-inventory.mjs render-pr \
            --inventory "$INVENTORY_PRE" \
            --receipt "$DOWNLOAD_RECEIPT" \
            --base-sha "$BASE_SHA" \
            --tag-sha "$TAG_SHA" \
            --tag "$RELEASE_TAG" \
            --manifest "$MANIFEST_PATH" \
            --run-url "$run_url" \
            --log "$RECOVERY_LOG" \
            --output "$pr_body"
          node scripts/check-pr-evidence.mjs --body-file "$pr_body"

          git switch -c "$BRANCH"
          git config user.name "elizaOS CI"
          git config user.email "ci@elizaos.ai"
          git add -- "$MANIFEST_PATH"
          git commit -m "chore(os): repair release manifest checksums for ${RELEASE_TAG}"
          git push origin "HEAD:refs/heads/${BRANCH}"

          pr_url="$(gh pr create \
            --draft \
            --base develop \
            --head "$BRANCH" \
            --title "chore(os): repair release manifest checksums for ${RELEASE_TAG}" \
            --body-file "$pr_body")"
          echo "Opened draft checksum recovery PR: ${pr_url}" >> "$GITHUB_STEP_SUMMARY"
