name: eliza-forgejo-staging

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${FORGEJO_DB_NAME:-forgejo}
      POSTGRES_USER: ${FORGEJO_DB_USER:-forgejo}
      POSTGRES_PASSWORD: ${FORGEJO_DB_PASSWORD:?set FORGEJO_DB_PASSWORD in the private .env file}
    volumes:
      - forgejo-postgres:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  forgejo:
    image: ${FORGEJO_IMAGE:?set FORGEJO_IMAGE to an approved Forgejo image in the private .env file}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      USER_UID: ${FORGEJO_UID:-1000}
      USER_GID: ${FORGEJO_GID:-1000}

      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: postgres:5432
      FORGEJO__database__NAME: ${FORGEJO_DB_NAME:-forgejo}
      FORGEJO__database__USER: ${FORGEJO_DB_USER:-forgejo}
      FORGEJO__database__PASSWD: ${FORGEJO_DB_PASSWORD:?set FORGEJO_DB_PASSWORD in the private .env file}
      FORGEJO__database__SSL_MODE: disable

      FORGEJO__server__DOMAIN: ${FORGEJO_DOMAIN:-git.staging.example.invalid}
      FORGEJO__server__ROOT_URL: ${FORGEJO_ROOT_URL:-https://git.staging.example.invalid/}
      FORGEJO__server__HTTP_ADDR: 0.0.0.0
      FORGEJO__server__HTTP_PORT: 3000
      FORGEJO__server__START_SSH_SERVER: "true"
      FORGEJO__server__SSH_DOMAIN: ${FORGEJO_SSH_DOMAIN:-git.staging.example.invalid}
      FORGEJO__server__SSH_PORT: ${FORGEJO_PUBLIC_SSH_PORT:-22}
      FORGEJO__server__SSH_LISTEN_PORT: 2222

      FORGEJO__security__INSTALL_LOCK: "true"
      FORGEJO__security__SECRET_KEY: ${FORGEJO_SECRET_KEY:?set FORGEJO_SECRET_KEY in the private .env file}
      FORGEJO__security__INTERNAL_TOKEN: ${FORGEJO_INTERNAL_TOKEN:?set FORGEJO_INTERNAL_TOKEN in the private .env file}
      FORGEJO__oauth2__JWT_SECRET: ${FORGEJO_OAUTH2_JWT_SECRET:?set FORGEJO_OAUTH2_JWT_SECRET in the private .env file}

      FORGEJO__service__DISABLE_REGISTRATION: "true"
      FORGEJO__service__ALLOW_ONLY_EXTERNAL_REGISTRATION: "true"
      FORGEJO__service__REQUIRE_SIGNIN_VIEW: "true"
      FORGEJO__service__REGISTER_EMAIL_CONFIRM: ${FORGEJO_REGISTER_EMAIL_CONFIRM:-false}
      FORGEJO__service__ENABLE_NOTIFY_MAIL: ${FORGEJO_MAIL_ENABLED:-false}
      FORGEJO__oauth2_client__ENABLE_AUTO_REGISTRATION: ${FORGEJO_OAUTH2_ENABLE_AUTO_REGISTRATION:-true}
      FORGEJO__oauth2_client__REGISTER_EMAIL_CONFIRM: ${FORGEJO_OAUTH2_REGISTER_EMAIL_CONFIRM:-false}
      FORGEJO__oauth2_client__USERNAME: ${FORGEJO_OAUTH2_USERNAME:-nickname}
      FORGEJO__oauth2_client__ACCOUNT_LINKING: ${FORGEJO_OAUTH2_ACCOUNT_LINKING:-login}
      FORGEJO__mailer__ENABLED: ${FORGEJO_MAIL_ENABLED:-false}
      FORGEJO__mailer__PROTOCOL: ${FORGEJO_MAIL_PROTOCOL:-smtps}
      FORGEJO__mailer__SMTP_ADDR: ${FORGEJO_SMTP_ADDR:-}
      FORGEJO__mailer__SMTP_PORT: ${FORGEJO_SMTP_PORT:-465}
      FORGEJO__mailer__FROM: ${FORGEJO_MAIL_FROM:-}
      FORGEJO__mailer__USER: ${FORGEJO_SMTP_USER:-}
      FORGEJO__mailer__PASSWD: ${FORGEJO_SMTP_PASSWORD:-}

      FORGEJO__actions__ENABLED: ${FORGEJO_ACTIONS_ENABLED:-true}
      FORGEJO__actions__DEFAULT_ACTIONS_URL: ${FORGEJO_ACTIONS_URL:-https://actions.staging.example.invalid}
      FORGEJO__actions__LOG_RETENTION_DAYS: ${FORGEJO_ACTION_LOG_RETENTION_DAYS:-14}
      FORGEJO__actions__ARTIFACT_RETENTION_DAYS: ${FORGEJO_ACTION_ARTIFACT_RETENTION_DAYS:-14}
      FORGEJO__ui__THEMES: ${FORGEJO_THEMES:-forgejo-auto,forgejo-light,forgejo-dark,eliza,eliza-light}
      FORGEJO__ui__DEFAULT_THEME: ${FORGEJO_DEFAULT_THEME:-eliza}
    ports:
      - "${FORGEJO_HTTP_BIND:-127.0.0.1}:${FORGEJO_HTTP_PORT:-3000}:3000"
      - "${FORGEJO_SSH_BIND:-127.0.0.1}:${FORGEJO_SSH_PORT:-2222}:2222"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/healthz || wget -q --spider http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    volumes:
      - forgejo-data:/var/lib/gitea
      - forgejo-config:/etc/gitea
      - ../../custom:/var/lib/gitea/custom:ro
    networks:
      - public
      - internal

  merge-steward-migrate:
    image: ${MERGE_STEWARD_IMAGE:-registry.staging.example.invalid/eliza/merge-steward:replace-me}
    restart: "no"
    profiles:
      - steward
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${MERGE_STEWARD_DATABASE_URL:?set MERGE_STEWARD_DATABASE_URL in the private .env file}
    command: ["npm", "run", "migrate"]
    networks:
      - internal

  merge-steward:
    image: ${MERGE_STEWARD_IMAGE:-registry.staging.example.invalid/eliza/merge-steward:replace-me}
    restart: unless-stopped
    profiles:
      - steward
    depends_on:
      forgejo:
        condition: service_healthy
      postgres:
        condition: service_healthy
      merge-steward-migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 8080
      MERGE_STEWARD_DEPLOYMENT_MODE: ${MERGE_STEWARD_DEPLOYMENT_MODE:-production}
      FORGEJO_BASE_URL: ${FORGEJO_ROOT_URL:-https://git.staging.example.invalid/}
      FORGEJO_STEWARD_USERNAME: ${FORGEJO_STEWARD_USERNAME:-eliza-merge-steward}
      FORGEJO_STEWARD_TOKEN: ${FORGEJO_STEWARD_TOKEN:-}
      FORGEJO_WEBHOOK_SECRET: ${FORGEJO_WEBHOOK_SECRET:?set FORGEJO_WEBHOOK_SECRET in the private .env file}
      MERGE_STEWARD_API_AUTH_REQUIRED: ${MERGE_STEWARD_API_AUTH_REQUIRED:-true}
      MERGE_STEWARD_API_TOKEN_ENV: MERGE_STEWARD_API_TOKEN
      MERGE_STEWARD_API_TOKEN: ${MERGE_STEWARD_API_TOKEN:?set MERGE_STEWARD_API_TOKEN in the private .env file}
      MERGE_STEWARD_METRICS_ENABLED: ${MERGE_STEWARD_METRICS_ENABLED:-true}
      MERGE_STEWARD_METRICS_AUTH_REQUIRED: ${MERGE_STEWARD_METRICS_AUTH_REQUIRED:-true}
      MERGE_STEWARD_OIDC_ENABLED: ${MERGE_STEWARD_OIDC_ENABLED:-true}
      OIDC_ISSUER_URL: ${ELIZA_CLOUD_OIDC_ISSUER_URL:-https://cloud.staging.example.invalid}
      OIDC_DISCOVERY_URL: ${ELIZA_CLOUD_OIDC_DISCOVERY_URL:-}
      OIDC_JWKS_URL: ${ELIZA_CLOUD_OIDC_JWKS_URL:-}
      OIDC_AUDIENCE: ${ELIZA_CLOUD_STEWARD_AUDIENCE:-eliza-merge-steward}
      MERGE_STEWARD_OIDC_REQUIRED_ROLES: ${MERGE_STEWARD_OIDC_REQUIRED_ROLES:-}
      MERGE_STEWARD_OIDC_REQUIRED_GROUPS: ${MERGE_STEWARD_OIDC_REQUIRED_GROUPS:-}
      MERGE_STEWARD_OIDC_ADMIN_ROLES: ${MERGE_STEWARD_OIDC_ADMIN_ROLES:-}
      MERGE_STEWARD_OIDC_ADMIN_GROUPS: ${MERGE_STEWARD_OIDC_ADMIN_GROUPS:-}
      MERGE_STEWARD_MAX_BODY_BYTES: ${MERGE_STEWARD_MAX_BODY_BYTES:-1048576}
      MERGE_STEWARD_WEBHOOK_REQUIRE_DELIVERY_ID: ${MERGE_STEWARD_WEBHOOK_REQUIRE_DELIVERY_ID:-true}
      MERGE_STEWARD_EVENT_GATE_ENABLED: ${MERGE_STEWARD_EVENT_GATE_ENABLED:-true}
      MERGE_STEWARD_EVENT_GATE_REPOSITORIES: ${MERGE_STEWARD_EVENT_GATE_REPOSITORIES:-elizaos/eliza}
      MERGE_STEWARD_EVENT_GATE_TRUSTED_ACTORS: ${MERGE_STEWARD_EVENT_GATE_TRUSTED_ACTORS:-}
      MERGE_STEWARD_EVENT_GATE_ALLOWED_KINDS: ${MERGE_STEWARD_EVENT_GATE_ALLOWED_KINDS:-}
      MERGE_STEWARD_EVENT_GATE_COMMAND_PREFIXES: ${MERGE_STEWARD_EVENT_GATE_COMMAND_PREFIXES:-/eliza,/steward}
      MERGE_STEWARD_EVENT_GATE_ALLOW_FORKS: ${MERGE_STEWARD_EVENT_GATE_ALLOW_FORKS:-false}
      MERGE_STEWARD_REQUIRE_AGENT_RUN_RECEIPT: ${MERGE_STEWARD_REQUIRE_AGENT_RUN_RECEIPT:-false}
      MERGE_STEWARD_REQUIRE_VERIFIED_AGENT_RUN_RECEIPT: ${MERGE_STEWARD_REQUIRE_VERIFIED_AGENT_RUN_RECEIPT:-false}
      MERGE_STEWARD_AGENT_RUN_RECEIPT_SECRET_ENV: ${MERGE_STEWARD_AGENT_RUN_RECEIPT_SECRET_ENV:-MERGE_STEWARD_AGENT_RUN_RECEIPT_SECRET}
      MERGE_STEWARD_AGENT_RUN_RECEIPT_SECRET: ${MERGE_STEWARD_AGENT_RUN_RECEIPT_SECRET:-}
      MERGE_STEWARD_REQUIRE_WORK_RESERVATION_FOR_AGENT_PRS: ${MERGE_STEWARD_REQUIRE_WORK_RESERVATION_FOR_AGENT_PRS:-false}
      MERGE_STEWARD_REQUIRE_WORK_ITEM_FOR_AGENT_PRS: ${MERGE_STEWARD_REQUIRE_WORK_ITEM_FOR_AGENT_PRS:-false}
      MERGE_STEWARD_REQUIRE_AGENT_BRANCH_NAMESPACE: ${MERGE_STEWARD_REQUIRE_AGENT_BRANCH_NAMESPACE:-false}
      MERGE_STEWARD_AGENT_BRANCH_NAMESPACE_PREFIX: ${MERGE_STEWARD_AGENT_BRANCH_NAMESPACE_PREFIX:-agent}
      MERGE_STEWARD_REQUIRE_AGENT_IDENTITY_REGISTRY: ${MERGE_STEWARD_REQUIRE_AGENT_IDENTITY_REGISTRY:-false}
      MERGE_STEWARD_AGENT_IDENTITY_REGISTRY: ${MERGE_STEWARD_AGENT_IDENTITY_REGISTRY:-}
      QUEUE_STORE_PATH: ${MERGE_STEWARD_QUEUE_STORE_PATH:-}
      FORGEJO_FEEDBACK_ENABLED: ${FORGEJO_FEEDBACK_ENABLED:-false}
      FORGEJO_FEEDBACK_DRY_RUN: ${FORGEJO_FEEDBACK_DRY_RUN:-true}
      FORGEJO_FEEDBACK_LABELS: ${FORGEJO_FEEDBACK_LABELS:-true}
      FORGEJO_FEEDBACK_COMMENTS: ${FORGEJO_FEEDBACK_COMMENTS:-true}
      FORGEJO_ENRICHMENT_ENABLED: ${FORGEJO_ENRICHMENT_ENABLED:-false}
      FORGEJO_PROTECTED_BRANCHES: ${FORGEJO_PROTECTED_BRANCHES:-main,develop}
      FORGEJO_REQUIRED_CHECKS: ${FORGEJO_REQUIRED_CHECKS:-}
      FORGEJO_ENRICHMENT_PAGE_LIMIT: ${FORGEJO_ENRICHMENT_PAGE_LIMIT:-50}
      FORGEJO_ENRICHMENT_MAX_PAGES: ${FORGEJO_ENRICHMENT_MAX_PAGES:-10}
      MERGE_STEWARD_INTEGRATION_ENABLED: ${MERGE_STEWARD_INTEGRATION_ENABLED:-false}
      MERGE_STEWARD_INTEGRATION_DRY_RUN: ${MERGE_STEWARD_INTEGRATION_DRY_RUN:-true}
      MERGE_STEWARD_INTEGRATION_EXECUTOR: ${MERGE_STEWARD_INTEGRATION_EXECUTOR:-none}
      MERGE_STEWARD_INTEGRATION_BATCHING: ${MERGE_STEWARD_INTEGRATION_BATCHING:-false}
      MERGE_STEWARD_INTEGRATION_BRANCH_PREFIX: ${MERGE_STEWARD_INTEGRATION_BRANCH_PREFIX:-eliza-queue}
      MERGE_STEWARD_INTEGRATION_BRANCH_MODE: ${MERGE_STEWARD_INTEGRATION_BRANCH_MODE:-reset}
      MERGE_STEWARD_INTEGRATION_ALLOW_EMPTY_CHECKS: ${MERGE_STEWARD_INTEGRATION_ALLOW_EMPTY_CHECKS:-false}
      MERGE_STEWARD_INTEGRATION_REMOTE_URL: ${MERGE_STEWARD_INTEGRATION_REMOTE_URL:-}
      MERGE_STEWARD_INTEGRATION_WORK_DIR: ${MERGE_STEWARD_INTEGRATION_WORK_DIR:-/state/git}
      MERGE_STEWARD_INTEGRATION_GIT_BINARY: ${MERGE_STEWARD_INTEGRATION_GIT_BINARY:-git}
      MERGE_STEWARD_INTEGRATION_PUSH_BRANCH: ${MERGE_STEWARD_INTEGRATION_PUSH_BRANCH:-false}
      MERGE_STEWARD_INTEGRATION_MERGE_METHOD: ${MERGE_STEWARD_INTEGRATION_MERGE_METHOD:-merge}
      MERGE_STEWARD_INTEGRATION_DELETE_BRANCH_AFTER_MERGE: ${MERGE_STEWARD_INTEGRATION_DELETE_BRANCH_AFTER_MERGE:-false}
      MERGE_STEWARD_INTEGRATION_MERGE_TITLE: ${MERGE_STEWARD_INTEGRATION_MERGE_TITLE:-}
      MERGE_STEWARD_INTEGRATION_MERGE_MESSAGE: ${MERGE_STEWARD_INTEGRATION_MERGE_MESSAGE:-}
      MERGE_STEWARD_CHECK_POLL_ATTEMPTS: ${MERGE_STEWARD_CHECK_POLL_ATTEMPTS:-1}
      MERGE_STEWARD_CHECK_POLL_INTERVAL_MS: ${MERGE_STEWARD_CHECK_POLL_INTERVAL_MS:-0}
      MERGE_STEWARD_WORKER_ENABLED: ${MERGE_STEWARD_WORKER_ENABLED:-false}
      MERGE_STEWARD_WORKER_ID: ${MERGE_STEWARD_WORKER_ID:-merge-steward-worker}
      MERGE_STEWARD_WORKER_POLL_INTERVAL_MS: ${MERGE_STEWARD_WORKER_POLL_INTERVAL_MS:-5000}
      MERGE_STEWARD_WORKER_CONFIRM_LIVE_EXECUTION: ${MERGE_STEWARD_WORKER_CONFIRM_LIVE_EXECUTION:-false}
      MERGE_STEWARD_WORKER_MAX_CONSECUTIVE_ERRORS: ${MERGE_STEWARD_WORKER_MAX_CONSECUTIVE_ERRORS:-5}
      MERGE_STEWARD_WORKER_LEASE_ENABLED: ${MERGE_STEWARD_WORKER_LEASE_ENABLED:-true}
      MERGE_STEWARD_WORKER_LEASE_ID: ${MERGE_STEWARD_WORKER_LEASE_ID:-merge-queue}
      MERGE_STEWARD_WORKER_LEASE_TTL_MS: ${MERGE_STEWARD_WORKER_LEASE_TTL_MS:-30000}
      MERGE_STEWARD_WORKER_LEASE_HEARTBEAT_INTERVAL_MS: ${MERGE_STEWARD_WORKER_LEASE_HEARTBEAT_INTERVAL_MS:-10000}
      DATABASE_URL: ${MERGE_STEWARD_DATABASE_URL:?set MERGE_STEWARD_DATABASE_URL in the private .env file}
    volumes:
      - merge-steward-state:/state
    ports:
      - "${MERGE_STEWARD_HTTP_BIND:-127.0.0.1}:${MERGE_STEWARD_HTTP_PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - public
      - internal

networks:
  public:
  internal:
    internal: true

volumes:
  forgejo-data:
  forgejo-config:
  forgejo-postgres:
  merge-steward-state:
