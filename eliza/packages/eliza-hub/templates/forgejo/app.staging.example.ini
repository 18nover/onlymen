; Example Forgejo app.ini for private Eliza staging.
; Replace angle-bracket placeholders on the host before use.
; Do not commit generated secrets or a filled app.ini.

APP_NAME = Eliza Hub Staging
RUN_MODE = prod
WORK_PATH = /var/lib/gitea

[server]
APP_DATA_PATH = /var/lib/gitea
DOMAIN = git.staging.example.invalid
ROOT_URL = https://git.staging.example.invalid/
HTTP_ADDR = 0.0.0.0
HTTP_PORT = 3000
PROTOCOL = http
START_SSH_SERVER = true
SSH_DOMAIN = git.staging.example.invalid
SSH_PORT = 22
SSH_LISTEN_HOST = 0.0.0.0
SSH_LISTEN_PORT = 2222
LFS_START_SERVER = true
LFS_JWT_SECRET = <set-from-secret-store>

[database]
DB_TYPE = postgres
HOST = postgres:5432
NAME = forgejo
USER = forgejo
PASSWD = <set-from-secret-store>
SSL_MODE = disable
LOG_SQL = false

[security]
INSTALL_LOCK = true
SECRET_KEY = <set-from-secret-store>
INTERNAL_TOKEN = <set-from-secret-store>
PASSWORD_HASH_ALGO = pbkdf2_hi

[oauth2]
JWT_SECRET = <set-from-secret-store>

[oauth2_client]
ENABLE_AUTO_REGISTRATION = true
REGISTER_EMAIL_CONFIRM = false
USERNAME = nickname
ACCOUNT_LINKING = login

[service]
DISABLE_REGISTRATION = true
ALLOW_ONLY_EXTERNAL_REGISTRATION = true
REQUIRE_SIGNIN_VIEW = true
REGISTER_EMAIL_CONFIRM = false
ENABLE_NOTIFY_MAIL = false
SHOW_REGISTRATION_BUTTON = false

[openid]
ENABLE_OPENID_SIGNIN = false
ENABLE_OPENID_SIGNUP = false

[repository]
ROOT = /var/lib/gitea/git/repositories
DEFAULT_BRANCH = main
DISABLE_HTTP_GIT = false

[actions]
ENABLED = true
DEFAULT_ACTIONS_URL = https://actions.staging.example.invalid
LOG_RETENTION_DAYS = 14
ARTIFACT_RETENTION_DAYS = 14

[webhook]
ALLOWED_HOST_LIST = private,loopback

[mailer]
ENABLED = false

[session]
PROVIDER = file
COOKIE_SECURE = true

[log]
MODE = console
LEVEL = info
ROOT_PATH = /var/lib/gitea/log

[ui]
THEMES = forgejo-auto,forgejo-light,forgejo-dark,eliza,eliza-light
DEFAULT_THEME = eliza

[git.timeout]
DEFAULT = 3600
MIGRATE = 7200
MIRROR = 7200
CLONE = 7200
PULL = 7200
GC = 600
