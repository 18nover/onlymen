APP_NAME = Eliza Hub
RUN_MODE = prod

[server]
DOMAIN = localhost
HTTP_ADDR = 127.0.0.1
HTTP_PORT = 3000
ROOT_URL = http://localhost:3000/
DISABLE_SSH = true

[database]
DB_TYPE = sqlite3
PATH = data/forgejo.db
LOG_SQL = false

[service]
DISABLE_REGISTRATION = false
REQUIRE_SIGNIN_VIEW = false
REGISTER_EMAIL_CONFIRM = false
ENABLE_NOTIFY_MAIL = false

[mailer]
ENABLED = false
PROTOCOL = smtps
SMTP_ADDR =
SMTP_PORT = 465
FROM =
USER =
PASSWD =

[actions]
ENABLED = true
DEFAULT_ACTIONS_URL = https://data.forgejo.org
LOG_RETENTION_DAYS = 7
ARTIFACT_RETENTION_DAYS = 7

[git.timeout]
DEFAULT = 3600
MIGRATE = 7200
MIRROR = 7200
CLONE = 7200
PULL = 7200
GC = 600

[ui]
THEMES = forgejo-auto,forgejo-light,forgejo-dark,eliza,eliza-light
DEFAULT_THEME = eliza
