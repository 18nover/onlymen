<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>OnlyMen Agent Org — Chat</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e6e8ec;
    --dim: #8b93a3;
    --accent: #ff8a3d;
    --ready: #4caf6a;
    --booting: #e0b13a;
    --stopped: #5a6072;
    --error: #e0503a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
  }
  #roster {
    width: 300px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px;
  }
  #roster h1 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--dim);
    margin: 4px 8px 12px;
  }
  .agent-card {
    padding: 10px 12px;
    border-radius: 10px;
    margin-bottom: 6px;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .agent-card:hover { background: var(--panel-2); }
  .agent-card.active { background: var(--panel-2); border-color: var(--accent); }
  .agent-card .row { display: flex; align-items: center; justify-content: space-between; }
  .agent-card .name { font-weight: 600; }
  .agent-card .role { font-size: 12px; color: var(--dim); margin-top: 2px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.stopped { background: var(--stopped); }
  .dot.booting { background: var(--booting); animation: pulse 1.2s infinite ease-in-out; }
  .dot.ready { background: var(--ready); }
  .dot.error { background: var(--error); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  #header .name { font-size: 18px; font-weight: 700; }
  #header .bio { font-size: 13px; color: var(--dim); margin-top: 4px; max-width: 60ch; }
  #header .tags { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--panel-2);
    color: var(--dim);
    border: 1px solid var(--border);
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg { max-width: 70ch; padding: 10px 14px; border-radius: 12px; white-space: pre-wrap; line-height: 1.45; }
  .msg.user { align-self: flex-end; background: var(--accent); color: #1a0f05; }
  .msg.agent { align-self: flex-start; background: var(--panel-2); border: 1px solid var(--border); }
  .msg.system { align-self: center; color: var(--dim); font-size: 12px; font-style: italic; }

  #composer {
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    gap: 10px;
  }
  #composer textarea {
    flex: 1;
    resize: none;
    height: 52px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 12px;
    font-family: inherit;
    font-size: 14px;
  }
  #composer button {
    background: var(--accent);
    color: #1a0f05;
    border: none;
    border-radius: 10px;
    padding: 0 20px;
    font-weight: 700;
    cursor: pointer;
  }
  #composer button:disabled { opacity: 0.5; cursor: default; }
  #empty {
    margin: auto;
    color: var(--dim);
    text-align: center;
  }
</style>
</head>
<body>
  <div id="roster">
    <h1>OnlyMen Org</h1>
    <div id="roster-list"></div>
  </div>
  <div id="main">
    <div id="empty">Pick an agent on the left to start chatting.</div>
  </div>

<script>
let roster = [];
let activeId = null;
const histories = {}; // id -> [{role, text}]
const pollTimers = {};

async function loadRoster() {
  const res = await fetch("/api/roster");
  roster = await res.json();
  renderRoster();
}

function statusLabel(a) {
  if (a.status === "error") return a.error || "error";
  if (a.status === "booting") return "starting… (~30-80s)";
  if (a.status === "ready") return "ready";
  return "not started";
}

function renderRoster() {
  const list = document.getElementById("roster-list");
  list.innerHTML = "";
  for (const a of roster) {
    const card = document.createElement("div");
    card.className = "agent-card" + (a.id === activeId ? " active" : "");
    card.onclick = () => selectAgent(a.id);
    card.innerHTML = `
      <div class="row">
        <div class="name">${a.name}</div>
        <div class="dot ${a.status}" title="${statusLabel(a)}"></div>
      </div>
      <div class="role">${(a.role || "").replaceAll("_", " ")}</div>
    `;
    list.appendChild(card);
  }
}

function findAgent(id) { return roster.find((a) => a.id === id); }

async function selectAgent(id) {
  activeId = id;
  renderRoster();
  renderMain();
  const a = findAgent(id);
  if (a.status === "stopped") {
    a.status = "booting";
    renderRoster();
    renderMain();
    await fetch(`/api/agents/${id}/start`, { method: "POST" });
    pollStatus(id);
  } else if (a.status === "booting") {
    pollStatus(id);
  }
}

function pollStatus(id) {
  if (pollTimers[id]) return;
  pollTimers[id] = setInterval(async () => {
    const res = await fetch(`/api/agents/${id}/status`);
    const body = await res.json();
    const a = findAgent(id);
    a.status = body.status;
    a.error = body.error;
    if (id === activeId) { renderRoster(); renderMain(); }
    if (a.status === "ready" || a.status === "error") {
      clearInterval(pollTimers[id]);
      delete pollTimers[id];
    }
  }, 3000);
}

function renderMain() {
  const main = document.getElementById("main");
  if (!activeId) {
    main.innerHTML = '<div id="empty">Pick an agent on the left to start chatting.</div>';
    return;
  }
  const a = findAgent(activeId);
  const hist = histories[activeId] || [];
  main.innerHTML = `
    <div id="header">
      <div class="name">${a.name}</div>
      <div class="bio">${(a.bio || []).join(" ")}</div>
      <div class="tags">${(a.adjectives || []).map((t) => `<span class="tag">${t}</span>`).join("")}</div>
    </div>
    <div id="messages"></div>
    <div id="composer">
      <textarea id="input" placeholder="Message ${a.name}…" ${a.status !== "ready" ? "disabled" : ""}></textarea>
      <button id="send" ${a.status !== "ready" ? "disabled" : ""}>${a.status === "ready" ? "Send" : statusLabel(a)}</button>
    </div>
  `;
  const messagesEl = document.getElementById("messages");
  for (const m of hist) {
    const div = document.createElement("div");
    div.className = "msg " + m.role;
    div.textContent = m.text;
    messagesEl.appendChild(div);
  }
  messagesEl.scrollTop = messagesEl.scrollHeight;

  const input = document.getElementById("input");
  const send = document.getElementById("send");
  const doSend = () => sendMessage(activeId, input.value);
  send.onclick = doSend;
  input.onkeydown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); doSend(); }
  };
}

async function sendMessage(id, text) {
  text = (text || "").trim();
  if (!text) return;
  histories[id] = histories[id] || [];
  histories[id].push({ role: "user", text });
  histories[id].push({ role: "system", text: "…thinking (can take 1-3 minutes on a cold agent)…" });
  renderMain();

  try {
    const res = await fetch(`/api/agents/${id}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text }),
    });
    const body = await res.json();
    histories[id].pop(); // remove "thinking" placeholder
    if (body.error) {
      histories[id].push({ role: "system", text: "Error: " + body.error });
    } else {
      histories[id].push({ role: "agent", text: body.response });
    }
  } catch (err) {
    histories[id].pop();
    histories[id].push({ role: "system", text: "Error: " + err });
  }
  renderMain();
}

loadRoster();
setInterval(loadRoster, 15000);
</script>
</body>
</html>
